{% extends "base.html" %}
{% block title %}Dashboard — ProcessForge{% endblock %}
{% block content %}
<h1>Start a New Interview</h1>
<p id="dashboard-welcome"></p>
<form id="interview-form">
  <div>
    <label for="business_name">Business Name</label>
    <input type="text" id="business_name" name="business_name" required>
  </div>
  <div>
    <label for="tenant">Tenant</label>
    <input type="text" id="tenant" name="tenant" required>
  </div>
  <div id="interview-error" class="error-message"></div>
  <button type="submit">Start Interview</button>
</form>
{% endblock %}
{% block scripts %}
<script>
  requireAuth();

  const welcomeBox = document.getElementById("dashboard-welcome");
  const username = getUsername();
  if (username) {
    welcomeBox.textContent = "Welcome, " + username + ".";
  }

  document.getElementById("interview-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    const errorBox = document.getElementById("interview-error");
    errorBox.textContent = "";

    const business_name = document.getElementById("business_name").value;
    const tenant = document.getElementById("tenant").value;

    let response;
    try {
      response = await fetchWithAuth("/interviews", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ business_name, tenant }),
      });
    } catch (err) {
      errorBox.textContent = "Could not reach the server. Please try again.";
      return;
    }

    if (!response.ok) {
      errorBox.textContent = "Could not start the interview. Please check your input and try again.";
      return;
    }

    const data = await response.json();
    sessionStorage.setItem("pf_interview_state", JSON.stringify({
      session_id: data.session_id,
      business_id: data.business_id,
      tenant: tenant,
      question: data.question,
    }));
    window.location.href = "/ui/interview";
  });
</script>
{% endblock %}
