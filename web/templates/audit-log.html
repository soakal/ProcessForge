{% extends "base.html" %}
{% block title %}Audit Log — ProcessForge{% endblock %}
{% block content %}
<h1>Audit Log</h1>
<form id="audit-log-form">
  <div>
    <label for="tenant">Tenant</label>
    <input type="text" id="tenant" name="tenant" required>
  </div>
  <div>
    <label for="record_id">Record ID</label>
    <input type="text" id="record_id" name="record_id">
  </div>
  <div id="audit-log-error" class="error-message"></div>
  <button type="submit">Search</button>
</form>
<div id="audit-log-results"></div>
{% endblock %}
{% block scripts %}
<script>
  requireAuth();

  const errorBox = document.getElementById("audit-log-error");
  const resultsBox = document.getElementById("audit-log-results");

  function renderResults(entries) {
    resultsBox.textContent = "";

    if (entries.length === 0) {
      const message = document.createElement("p");
      message.textContent = "No audit log entries found.";
      resultsBox.appendChild(message);
      return;
    }

    const table = document.createElement("table");
    const thead = document.createElement("thead");
    const headerRow = document.createElement("tr");
    ["Timestamp", "Operator", "Record Kind", "Record ID", "Field", "Old Value", "New Value"].forEach((label) => {
      const th = document.createElement("th");
      th.textContent = label;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    entries.forEach((entry) => {
      const row = document.createElement("tr");
      [
        entry.ts,
        entry.operator_id,
        entry.record_kind,
        entry.record_id,
        entry.field,
        entry.old_value,
        entry.new_value,
      ].forEach((value) => {
        const td = document.createElement("td");
        td.textContent = value;
        row.appendChild(td);
      });
      tbody.appendChild(row);
    });
    table.appendChild(tbody);

    resultsBox.appendChild(table);
  }

  document.getElementById("audit-log-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    errorBox.textContent = "";
    resultsBox.textContent = "";

    const tenant = document.getElementById("tenant").value;
    const recordId = document.getElementById("record_id").value;

    let url = "/audit-log?tenant=" + encodeURIComponent(tenant);
    if (recordId) {
      url += "&record_id=" + encodeURIComponent(recordId);
    }

    let response;
    try {
      response = await fetchWithAuth(url);
    } catch (err) {
      errorBox.textContent = "Could not reach the server. Please try again.";
      return;
    }

    if (response.status === 401) {
      errorBox.textContent = "You are not authorized to view the audit log.";
      return;
    }

    if (!response.ok) {
      errorBox.textContent = "Something went wrong. Please try again.";
      return;
    }

    const entries = await response.json();
    renderResults(entries);
  });
</script>
{% endblock %}
